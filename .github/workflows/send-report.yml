name: Reporte PMO Entregables

on:
  schedule:
    - cron: '0 13 * * 1'
    - cron: '0 23 * * 5'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generar y enviar reporte
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node << 'SCRIPT'
            const https = require('https');

            function jiraGet(auth, path) {
              return new Promise((resolve, reject) => {
                const opts = {
                  hostname: 'efletexia.atlassian.net', path, method: 'GET',
                  headers: { 'Authorization': `Basic ${auth}`, 'Accept': 'application/json' }
                };
                const req = https.request(opts, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => { try { resolve({ status: res.statusCode, body: JSON.parse(d) }); } catch(e) { reject(e); } });
                });
                req.on('error', reject);
                req.end();
              });
            }

            async function fetchAllPages(auth, jql, fields) {
              let allIssues = [];
              let nextPageToken = null;
              do {
                const params = new URLSearchParams({ jql, fields, maxResults: 100 });
                if (nextPageToken) params.set('nextPageToken', nextPageToken);
                const result = await jiraGet(auth, `/rest/api/3/search/jql?${params.toString()}`);
                if (result.status !== 200) throw new Error(`Jira ${result.status}: ${JSON.stringify(result.body)}`);
                const page = result.body;
                allIssues = allIssues.concat(page.issues || []);
                nextPageToken = page.isLast ? null : page.nextPageToken;
                if (allIssues.length >= 2000) break;
              } while (nextPageToken);
              return allIssues;
            }

            function sendEmail(apiKey, to, subject, html) {
              return new Promise((resolve, reject) => {
                const data = JSON.stringify({ from: 'PMO Efletexia <onboarding@resend.dev>', to, subject, html });
                const opts = {
                  hostname: 'api.resend.com', path: '/emails', method: 'POST',
                  headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(data) }
                };
                const req = https.request(opts, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => resolve({ status: res.statusCode, body: d }));
                });
                req.on('error', reject);
                req.write(data);
                req.end();
              });
            }

            function getActualizadoLabel() {
              const now = new Date();
              const fecha = now.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
              const hora = now.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'});
              return `${fecha} ${hora}`;
            }

            function getMonthRange() {
              const now = new Date();
              const start = new Date(now.getFullYear(), now.getMonth(), 1);
              const end = new Date(now.getFullYear(), now.getMonth() + 1, 0);
              const iso = d => d.toISOString().slice(0,10);
              return { desde: iso(start), hasta: iso(end) };
            }

            function adfText(node) {
              if (!node) return '';
              if (typeof node === 'string') return node;
              if (node.type === 'text') return node.text || '';
              return (node.content || []).map(adfText).join('');
            }

            const STATUS_COLORS = { 'En plazo':'#4ade80', 'Replanificado':'#F5B800', 'Vencido':'#ef4444', 'Producción':'#3B82F6' };
            const ORDEN_ESTADOS = ['En plazo','Replanificado','Vencido','Producción'];

            function getSemaforo(e) {
              const s = (e.status||'').toLowerCase();
              const hoy = new Date(); hoy.setHours(0,0,0,0);
              const fin = e.duedate ? new Date(e.duedate+'T12:00:00') : null;
              if (!fin) return { label:'Sin fecha', color:'#6b7280' };
              if (s==='producción'||s==='produccion') return { label:'Producción', color: STATUS_COLORS['Producción'] };
              if (fin < hoy) return { label:'Vencido', color: STATUS_COLORS['Vencido'] };
              if (e.replan) return { label:'Replanificado', color: STATUS_COLORS['Replanificado'] };
              return { label:'En plazo', color: STATUS_COLORS['En plazo'] };
            }

            function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

            function buildResumenMensual(active) {
              const byMonth = {};
              active.forEach(e => {
                const d = new Date(e.duedate+'T12:00:00');
                const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
                (byMonth[mk] = byMonth[mk] || []).push(e);
              });
              const mesesKeys = Object.keys(byMonth).sort();
              const rows = mesesKeys.map(mk => {
                const items = byMonth[mk];
                const mesLabel = cap(new Date(mk+'-01T12:00:00').toLocaleDateString('es-PE',{month:'long',year:'numeric'}));
                const grupos = {};
                items.forEach(e => {
                  const sem = getSemaforo(e);
                  (grupos[sem.label] = grupos[sem.label] || []).push(e);
                });
                const bloques = ORDEN_ESTADOS.filter(o => grupos[o] && grupos[o].length).map(o => {
                  const col = STATUS_COLORS[o];
                  const squares = grupos[o].map(() => `<span style="display:inline-block;width:13px;height:13px;border-radius:3px;background:${col};margin-right:2px;vertical-align:middle"></span>`).join('');
                  return `<span style="margin-right:14px;white-space:nowrap">${squares}<span style="font-size:11px;color:#64748b;margin-left:3px">${grupos[o].length}</span></span>`;
                }).join('');
                return `<tr><td style="padding:4px 12px 4px 0;font-size:11px;color:#64748b;white-space:nowrap;vertical-align:middle">${mesLabel}</td><td style="vertical-align:middle">${bloques}</td></tr>`;
              }).join('');
              return rows;
            }

            function buildIndicadores(total, enPlazo, prod, replanN, venc, standby, backlog, cumpl, cumplColor) {
              const pct = n => total ? Math.round(n/total*100) : 0;
              return `
                <div style="font-size:12px;font-weight:700;color:#3B82F6;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">&#128202; Indicadores del Portafolio</div>
                <table style="width:100%;border-collapse:collapse;font-size:12px">
                  <tr><td style="padding:4px 0;color:#94a3b8">&#128230; Total entregables</td><td style="text-align:right;color:#f1f5f9;font-weight:600">${total}</td></tr>
                  <tr><td style="padding:4px 0;color:#94a3b8"><span style="color:#4ade80">&#9679;</span> En plazo</td><td style="text-align:right;color:#4ade80;font-weight:600">${enPlazo} <span style="color:#475569">${pct(enPlazo)}%</span></td></tr>
                  <tr><td style="padding:4px 0;color:#94a3b8"><span style="color:#3B82F6">&#9679;</span> Producción</td><td style="text-align:right;color:#14B8A6;font-weight:600">${prod} <span style="color:#475569">${pct(prod)}%</span></td></tr>
                  <tr><td style="padding:4px 0;color:#94a3b8"><span style="color:#F5B800">&#9679;</span> Replanificados</td><td style="text-align:right;color:#F5B800;font-weight:600">${replanN} <span style="color:#475569">${pct(replanN)}%</span></td></tr>
                  <tr><td style="padding:4px 0;color:#94a3b8"><span style="color:#ef4444">&#9679;</span> Vencidos</td><td style="text-align:right;color:#ef4444;font-weight:600">${venc} <span style="color:#475569">${pct(venc)}%</span></td></tr>
                  <tr><td style="padding:4px 0;color:#F5B800">&#9888; Proyectos con Bloqueantes</td><td style="text-align:right;color:#f1f5f9;font-weight:600">${standby}</td></tr>
                  <tr><td style="padding:4px 0;color:#64748b">&#9744; Backlog</td><td style="text-align:right;color:#f1f5f9;font-weight:600">${backlog}</td></tr>
                </table>
                <div style="margin-top:12px;padding-top:10px;border-top:1px solid #1e2d40;text-align:center">
                  <div style="font-size:10px;color:#64748b;margin-bottom:3px">&#128200; Cumplimiento General</div>
                  <div style="font-size:28px;font-weight:700;color:${cumplColor}">${cumpl}%</div>
                </div>`.split('\n').map(l => l.trim()).join('');
            }

            function buildGantt(days, months, items) {
              const COL_W = 24;
              if (!items.length) {
                return '<div style="padding:16px;text-align:center;color:#475569;font-size:12px">Sin entregables esta semana</div>';
              }
              const monthHeader = months.map(m => `<td colspan="${m.count}" style="padding:4px 2px;font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:1px solid #1e2d40;text-align:center">${m.label}</td>`).join('');
              const dayHeader = days.map(d => {
                const bg = d.isHoy ? 'rgba(59,130,246,.25)' : d.isWE ? 'rgba(255,255,255,.04)' : 'transparent';
                const col = d.isHoy ? '#60a5fa' : d.isWE ? '#64748b' : '#94a3b8';
                return `<td style="width:${COL_W}px;text-align:center;font-size:9px;padding:4px 0;background:${bg};color:${col};border-bottom:1px solid #1e2d40">${d.day}</td>`;
              }).join('');
              const bodyRows = items.map((e, i) => {
                const sem = getSemaforo(e);
                const rowBg = i % 2 === 0 ? 'transparent' : 'rgba(255,255,255,.02)';
                const cells = days.map(d => {
                  const cellBg = d.isHoy ? 'rgba(59,130,246,.08)' : d.isWE ? 'rgba(255,255,255,.025)' : 'transparent';
                  if (d.iso === e.duedate) {
                    return `<td style="padding:3px;background:${cellBg};border-bottom:1px solid rgba(255,255,255,.05)"><div style="width:18px;height:18px;border-radius:4px;background:${sem.color};margin:0 auto"></div></td>`;
                  }
                  return `<td style="background:${cellBg};border-bottom:1px solid rgba(255,255,255,.05)"></td>`;
                }).join('');
                return `<tr style="background:${rowBg}"><td style="padding:6px 10px;border-right:1px solid #1e2d40;border-bottom:1px solid rgba(255,255,255,.05);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis"><div style="font-size:11px;font-weight:600"><a href="https://efletexia.atlassian.net/browse/${e.key}" style="color:#60a5fa;text-decoration:none">${e.codigo||e.key}</a></div><div style="font-size:11px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px">${e.summary}</div></td>${cells}</tr>`;
              }).join('');
              return `<div style="overflow-x:auto"><table style="border-collapse:collapse"><tr><td style="border-right:1px solid #1e2d40"></td>${monthHeader}</tr><tr><td style="border-right:1px solid #1e2d40"></td>${dayHeader}</tr>${bodyRows}</table></div>`.split('\n').map(l => l.trim()).join('');
            }

            function buildDaysAndMonths(desde, hasta) {
              const hoy = new Date(); hoy.setHours(0,0,0,0);
              const hoyIso = hoy.toISOString().slice(0,10);
              const start = new Date(desde+'T12:00:00');
              const end = new Date(hasta+'T12:00:00');
              const days = [];
              let cur = new Date(start);
              while (cur <= end) {
                const iso = cur.toISOString().slice(0,10);
                const dow = cur.getDay();
                days.push({ iso, day: cur.getDate(), dow, isWE: dow===0||dow===6, isHoy: iso===hoyIso });
                cur.setDate(cur.getDate()+1);
              }
              const months = [];
              days.forEach(d => {
                const label = new Date(d.iso+'T12:00:00').toLocaleDateString('es-PE',{month:'short',year:'numeric'}).toUpperCase();
                if (!months.length || months[months.length-1].label !== label) months.push({ label, count: 1 });
                else months[months.length-1].count++;
              });
              return { days, months };
            }

            async function main() {
              const JIRA_EMAIL = process.env.JIRA_EMAIL;
              const JIRA_TOKEN = process.env.JIRA_TOKEN;
              const RESEND_KEY = process.env.RESEND_API_KEY;
              const auth = Buffer.from(`${JIRA_EMAIL}:${JIRA_TOKEN}`).toString('base64');

              const FIELDS = 'summary,status,duedate,customfield_10934,customfield_10725,customfield_10726,customfield_11070,customfield_11269';
              const jql = 'project = PTS AND issuetype = Epic ORDER BY created ASC';
              const issues = await fetchAllPages(auth, jql, FIELDS);
              console.log('Epicas encontradas:', issues.length);

              const epics = issues.map(i => {
                const f = i.fields||{};
                return {
                  key: i.key,
                  codigo: f.customfield_10934||i.key,
                  summary: f.summary||'',
                  status: f.status?.name||'',
                  duedate: f.duedate||null,
                  sponsor: f.customfield_11070?.value||'—',
                  planPct: f.customfield_10725!=null ? Math.round(f.customfield_10725*100) : null,
                  realPct: f.customfield_10726!=null ? Math.round(f.customfield_10726*100) : null,
                  replan: f.customfield_11269 ? adfText(f.customfield_11269).trim() : null
                };
              });

              // Mismas listas de exclusión que app.js, por sección
              const SPECIAL_EPIC_KEYS = ['PTS-327','PTS-326'];
              const EXCL_KPI = ['stand by','backlog','desestimado','planificado'];
              const EXCL_RESUMEN = ['stand by','standby','stand-by','backlog','desestimado'];
              const EXCL_GANTT = ['backlog','desestimado','stand by','standby','stand-by','bloqueado','blocked'];

              const actualizado = getActualizadoLabel();
              const { desde: mDesde, hasta: mHasta } = getMonthRange();

              // Indicadores del Portafolio: mismo alcance de mes que el Gantt, misma exclusión que renderKpiEjecutivo
              const dataKpi = epics.filter(e => !SPECIAL_EPIC_KEYS.includes(e.key) && e.duedate && !EXCL_KPI.includes((e.status||'').toLowerCase()) && e.duedate>=mDesde && e.duedate<=mHasta);
              const total = dataKpi.length;
              const enPlazo = dataKpi.filter(e => getSemaforo(e).label==='En plazo').length;
              const prod = dataKpi.filter(e => getSemaforo(e).label==='Producción').length;
              const replanN = dataKpi.filter(e => getSemaforo(e).label==='Replanificado').length;
              const venc = dataKpi.filter(e => getSemaforo(e).label==='Vencido').length;
              const cumpl = total>0 ? Math.round((enPlazo+prod)/total*100) : 0;
              const cumplColor = cumpl>=80?'#4ade80':cumpl>=60?'#F5B800':'#ef4444';
              const standby = epics.filter(e => !SPECIAL_EPIC_KEYS.includes(e.key) && (e.status||'').toLowerCase()==='stand by').length;
              const backlog = epics.filter(e => !SPECIAL_EPIC_KEYS.includes(e.key) && (e.status||'').toLowerCase()==='backlog').length;

              // Resumen mensual: sin filtro de mes (histórico completo), igual que renderResumenMensual
              const dataResumen = epics.filter(e => !SPECIAL_EPIC_KEYS.includes(e.key) && e.duedate && !EXCL_RESUMEN.includes((e.status||'').toLowerCase()));
              const resumen = buildResumenMensual(dataResumen);
              const indicadores = buildIndicadores(total, enPlazo, prod, replanN, venc, standby, backlog, cumpl, cumplColor);

              // Gantt: mismo mes que Indicadores, misma exclusión que renderEntregables
              const dataGantt = epics.filter(e => !SPECIAL_EPIC_KEYS.includes(e.key) && e.duedate && !EXCL_GANTT.includes((e.status||'').toLowerCase()) && e.duedate>=mDesde && e.duedate<=mHasta);
              const entregablesGantt = dataGantt.sort((a,b) => a.duedate.localeCompare(b.duedate));
              const { days, months } = buildDaysAndMonths(mDesde, mHasta);
              const gantt = buildGantt(days, months, entregablesGantt);

              const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="margin:0;padding:0;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,sans-serif"><div style="max-width:900px;margin:0 auto;padding:20px 16px"><div style="font-size:13px;color:#cbd5e1;line-height:1.6;margin-bottom:18px">Estimados:<br><br>Se envía el reporte de avance de los proyectos. En el reporte podrán ver los entregables completados y aquellos que se encuentran en proceso.</div><div style="border-bottom:1px solid #1e2d40;margin-bottom:16px;padding-bottom:10px;display:flex;justify-content:space-between"><span style="font-size:11px;color:#475569">PMO Dashboard — Efletexia &#8594; Entregables</span><span style="font-size:11px;color:#475569">Actualizado ${actualizado} &nbsp;·&nbsp; <a href="https://pmo-efletexia.vercel.app" style="color:#3B82F6;text-decoration:none">Ver dashboard &#8594;</a></span></div><table style="width:100%;border-collapse:collapse;margin-bottom:16px"><tr style="vertical-align:top"><td style="width:55%;padding-right:20px"><div style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Resumen mensual de entregables</div><table style="border-collapse:collapse">${resumen}</table></td><td style="background:#131c2b;border-radius:8px;padding:16px">${indicadores}</td></tr></table><div style="background:#131c2b;border-radius:8px;overflow:hidden;margin-bottom:12px"><div style="padding:10px 16px;border-bottom:1px solid #1e2d40"><span style="font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.06em">Entregables</span></div>${gantt}</div><div style="font-size:11px;color:#475569;padding:4px 0"><span style="color:#ef4444">&#9679;</span> Vencido &nbsp;<span style="color:#F5B800">&#9679;</span> Replanificado &nbsp;<span style="color:#4ade80">&#9679;</span> En plazo &nbsp;<span style="color:#3B82F6">&#9679;</span> Producción</div><div style="font-size:13px;color:#cbd5e1;line-height:1.6;margin-top:18px">Atentamente<br><br>Abel Alva</div></div></body></html>`;

              const mail = await sendEmail(RESEND_KEY, ['abel.alva@dtgrupo.com', 'marcos.fidel@efletexia.com', 'andres.medina@efletexia.com', 'roxana.peralta@dtgrupo.com'], `📊 Reporte PMO — ${actualizado}`, html);
              console.log('Resend status:', mail.status);
              console.log('Resend body:', mail.body);
            }

            main().catch(e => { console.error(e); process.exit(1); });
          SCRIPT
